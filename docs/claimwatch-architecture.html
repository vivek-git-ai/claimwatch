<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClaimWatch — Interactive Architecture</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg:     #faf9f7;
  --bg2:    #f1efe8;
  --bg3:    #e8e6df;
  --text:   #1a1a18;
  --text2:  #5f5e5a;
  --text3:  #888780;
  --border: rgba(0,0,0,0.12);
  --border2:rgba(0,0,0,0.22);
  --r:      8px;
  --rl:     12px;
  --font:   system-ui, 'Segoe UI', sans-serif;
  --mono:   'Cascadia Code', 'Fira Code', monospace;

  --c-gray-50:#F1EFE8; --c-gray-200:#B4B2A9; --c-gray-600:#5F5E5A; --c-gray-800:#444441; --c-gray-900:#2C2C2A;
  --c-teal-50:#E1F5EE; --c-teal-100:#9FE1CB; --c-teal-600:#0F6E56; --c-teal-800:#085041; --c-teal-900:#04342C;
  --c-purple-50:#EEEDFE; --c-purple-100:#CECBF6; --c-purple-600:#534AB7; --c-purple-800:#3C3489; --c-purple-900:#26215C;
  --c-amber-50:#FAEEDA;  --c-amber-100:#FAC775; --c-amber-600:#854F0B; --c-amber-800:#633806; --c-amber-900:#412402;
  --c-blue-50:#E6F1FB;   --c-blue-100:#B5D4F4;  --c-blue-600:#185FA5; --c-blue-800:#0C447C;  --c-blue-900:#042C53;
  --c-coral-50:#FAECE7;  --c-coral-100:#F5C4B3; --c-coral-600:#993C1D;--c-coral-800:#712B13; --c-coral-900:#4A1B0C;
  --c-green-50:#EAF3DE;  --c-green-100:#C0DD97; --c-green-600:#3B6D11;--c-green-800:#27500A; --c-green-900:#173404;
  --c-red-50:#FCEBEB;    --c-red-100:#F7C1C1;   --c-red-600:#A32D2D;  --c-red-800:#791F1F;   --c-red-900:#501313;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18; --bg2:#242422; --bg3:#2e2e2c; --text:#e8e6df; --text2:#9c9a92; --text3:#636159;
  --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
  --c-gray-50:#2C2C2A; --c-gray-200:#5F5E5A; --c-gray-600:#B4B2A9; --c-gray-800:#D3D1C7; --c-gray-900:#F1EFE8;
  --c-teal-50:#04342C; --c-teal-100:#085041; --c-teal-600:#5DCAA5; --c-teal-800:#9FE1CB; --c-teal-900:#E1F5EE;
  --c-purple-50:#26215C;--c-purple-100:#3C3489;--c-purple-600:#AFA9EC;--c-purple-800:#CECBF6;--c-purple-900:#EEEDFE;
  --c-amber-50:#412402; --c-amber-100:#633806;--c-amber-600:#EF9F27;--c-amber-800:#FAC775; --c-amber-900:#FAEEDA;
  --c-blue-50:#042C53;  --c-blue-100:#0C447C; --c-blue-600:#85B7EB; --c-blue-800:#B5D4F4;  --c-blue-900:#E6F1FB;
  --c-coral-50:#4A1B0C; --c-coral-100:#712B13;--c-coral-600:#F0997B;--c-coral-800:#F5C4B3;--c-coral-900:#FAECE7;
  --c-green-50:#173404; --c-green-100:#27500A;--c-green-600:#97C459;--c-green-800:#C0DD97; --c-green-900:#EAF3DE;
  --c-red-50:#501313;   --c-red-100:#791F1F;  --c-red-600:#F09595;  --c-red-800:#F7C1C1;   --c-red-900:#FCEBEB;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);line-height:1.5;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:24px 20px 40px}

/* Header */
.hd{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
.hd h1{font-size:18px;font-weight:600;letter-spacing:-.3px}
.hd span{font-size:12px;color:var(--text3);font-family:var(--mono)}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--border);margin-bottom:18px;padding-bottom:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:7px 14px 9px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font);transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.view{display:none}.view.active{display:block}

/* SVG wrapper */
.diagram{width:100%;overflow-x:auto}
.diagram svg{width:100%;height:auto;display:block}

/* Detail panel */
.detail{margin-top:14px;padding:14px 18px;background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--border);min-height:72px;transition:background .2s}
.detail-hint{font-size:12px;color:var(--text3);line-height:1.6;display:flex;align-items:center;gap:8px}
.detail-hint i{font-size:16px}
.detail-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px}
.detail-desc{font-size:12px;color:var(--text2);line-height:1.7}
.detail-code{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:2px 6px;border-radius:4px;color:var(--text)}
.detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tag{font-size:11px;padding:2px 9px;border-radius:999px;border:0.5px solid transparent;font-family:var(--font)}
.tag-teal{background:var(--c-teal-50);color:var(--c-teal-800);border-color:var(--c-teal-100)}
.tag-purple{background:var(--c-purple-50);color:var(--c-purple-800);border-color:var(--c-purple-100)}
.tag-amber{background:var(--c-amber-50);color:var(--c-amber-800);border-color:var(--c-amber-100)}
.tag-blue{background:var(--c-blue-50);color:var(--c-blue-800);border-color:var(--c-blue-100)}
.tag-coral{background:var(--c-coral-50);color:var(--c-coral-800);border-color:var(--c-coral-100)}
.tag-gray{background:var(--c-gray-50);color:var(--c-gray-800);border-color:var(--c-gray-200)}
.tag-green{background:var(--c-green-50);color:var(--c-green-800);border-color:var(--c-green-100)}
.tag-red{background:var(--c-red-50);color:var(--c-red-800);border-color:var(--c-red-100)}

/* SVG node cursor */
.cw-node{cursor:pointer}
.cw-node:hover rect,.cw-node:hover ellipse{opacity:.82}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
</style>
</head>

  'ask-ui': {

  },
  'lc-revised': {

  'lc-failed': {

  'lc-stale': {

    desc: 'Auto-stale fires when: claim has a parseable timeframe AND timeframe + 120 days grace has elapsed AND the claim is still open AND no resolution has been found in-corpus. Not a quality judgement — simply means the claim window has passed without spoken evidence in the processed transcript set.',

  'lc-unresolvable': {

    title: 'Pipeline (SUT) — Azure GPT-4o',

  'ev-preds': {

    desc: 'Extraction predictions: data/claims/claims_made.json (all claims from T00–T04). Resolution predictions: data/claims/steps/04_2022-02-10_earnings_call_Q4/claims_with_resolutions.json. The matcher filters extraction candidates by source_doc to keep per-transcript precision/recall meaningful.',

  'ev-matcher': {

  'ev-metrics-a': {

    tags: [{t:'Azure GPT-4o', c:'purple'},{t:'3 verdict fields', c:'purple'},{t:'same family as SUT', c:'coral'},{t:'reported separately', c:'purple'}]
  },

    title: 'Stage B metrics',
    desc: 'Extraction: 98.1% reproduces_gold accuracy (53/54). Resolution: 100% status accuracy. Full results in data/eval/results.json. The deck reports Stage A and Stage B as separate columns so the reader sees which drove each number.',

  'ev-results': {

    tags: [{t:'eval CLI', c:'blue'},{t:'run --eval', c:'blue'},{t:'Pipeline Eval page', c:'blue'}]

  'ev-evdash': {
    title: 'Pipeline Eval page — Streamlit dashboard',
    desc: 'One of the 7 dashboard pages. Reads data/eval/results.json only. Displays Stage A and Stage B metrics side-by-side, by-transcript breakdown, and confusion matrix for resolution status. Pre-review vs post-review numbers shown with reviewed=true count header.',
    tags: [{t:'results.json', c:'blue'},{t:'Streamlit', c:'blue'},{t:'pre/post-review', c:'coral'}]
  }

function cwTab(btn, name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('cw-detail').innerHTML = '<p class="detail-hint"><i class="ti ti-hand-click" aria-hidden="true"></i> Click any component to see details</p>';
}

function cwDetail(id) {
  const d = DETAILS[id];
  if (!d) return;
  const tagsHtml = (d.tags || []).map(t => `<span class="tag tag-${t.c}">${t.t}</span>`).join('');
  document.getElementById('cw-detail').innerHTML =
    `<p class="detail-title">${d.title}</p>
     <p class="detail-desc">${d.desc}</p>
     ${tagsHtml ? `<div class="detail-tags">${tagsHtml}</div>` : ''}`;
}
